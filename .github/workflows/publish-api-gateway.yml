name: Publish API Gateway Container Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'containers/api-gateway/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/api-gateway

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # NOSONAR

      - name: Get version from package.json
        id: package-version
        run: echo "VERSION=$(jq -r .version containers/api-gateway/package.json)" >> $GITHUB_ENV

      - name: Prepare package.json for NPM registry (Immutable versions)
        uses: Quatrain/actions/prepare-package-json@v1
        with:
          package_json_path: 'containers/api-gateway/package.json'
          dependency_prefix: '@quatrain/'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3 # NOSONAR
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5 # NOSONAR
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ env.VERSION }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5 # NOSONAR
        with:
          context: containers/api-gateway
          file: containers/api-gateway/ContainerFile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
      - name: Restore package.json to original (with placeholders)
        run: git checkout containers/api-gateway/package.json

      - name: Bump package version and push tag
        uses: Quatrain/actions/push-tag@v1
        with:
          bump_type: 'patch'
        working-directory: containers/api-gateway
